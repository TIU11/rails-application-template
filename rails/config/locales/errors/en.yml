  errors:
    actions:
      index: list
      new: create
      show: view

    # Error Message Scopes:
    # errors.attributes.[attribute_name]
    # errors.messages

    attributes:
      email:
        invalid: should look like an email address.
      password:
        invalid: must not repeat characters (e.g. "111")
        uniform: must be complex. Use a combination of uppercase (A-Z), lowercase (a-z), number (0-9) and special characters.

