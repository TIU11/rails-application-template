en:
  activemodel:
    errors:
      models:
        password_change_request:
          attributes:
            base:
              account_not_found_html: Unable to find an account matching the email or username you provided. Try checking your spelling, or <a class="alert-link" href="mailto:%{email}?subject=Request Help Resetting Password&body=I'm having trouble updating my password because I don't know the registered email or username. (add details)">contact us</a> to look up your account.
              account_problem_html: There is a problem with your account. Please <a class="alert-link" href="mailto:%{email}?subject=Request Help Resetting Password&body=I'm having trouble updating my password because there is a problem with my account. (add details)">contact us</a> to update your account.

  activerecord:

    errors:

      # Error Message Scopes:
      # activerecord.errors.models.[model_name]
      # activerecord.errors.models.[model_name].attributes.[attribute_name]
      # activerecord.errors.messages

      # models:
      #   user:
      #     key: message
      #     attributes:
      #       first_name:
      #         key: message

      # messages:
      #   key: message text

  errors:
    actions:
      index: list
      new: create
      show: view

    # Error Message Scopes:
    # errors.attributes.[attribute_name]
    # errors.messages

    attributes:
      email:
        invalid: should look like an email address.
      password:
        invalid: must not repeat characters (e.g. "111")
        uniform: must be complex. Use a combination of uppercase (A-Z), lowercase (a-z), number (0-9) and special characters.
      zip:
        invalid: should be in the form 12345 or 12345-1234

    # messages:
    #   key: message text
