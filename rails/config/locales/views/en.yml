# View Translations
# See (http://guides.rubyonrails.org/i18n.html#lazy-lookup)
en:
  exception:
    internal_server_error:
      title: Internal Server Error
      header: We're sorry, but something went wrong
      message: We track these errors automatically, but if the problem persists feel free to contact us.
    not_found:
      title: Page Not Found
      header: The page you were looking for isn't found here.
      message: You may have mistyped the address or the page may have moved.

  passwords:
    edit:
      inactive_link_html: We're sorry, but this is not an active password reset link. You can <a href="%{new_password_path}" class="alert-link">generate a new one</a>.
    create:
      # inactive_link_html:
      sent_email: Instructions to change your password have been emailed to the registered email. Please check your email.
    new:
      submit: Email my password update link
    update:
      updated: Password successfully updated

  user_sessions:
    create:
      welcome: Welcome to the <%= app_name.titleize %>
    destroy:
      logout: You are now logged out
      timeout: Your secure connection timed out. Please login to continue.
    su:
      inactive: Can not switch to an inactive user
      success: You've been logged in as %{user}
    unsu:
      error: Sorry, we couldn't find your original user.
      success: You have exited your switch user session, and resumed as %{user}
