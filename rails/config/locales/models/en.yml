# Model Translations
# See (http://guides.rubyonrails.org/i18n.html#translations-for-active-record-models)
# See (https://github.com/svenfuchs/rails-i18n/tree/master/rails/locale)
en:
  activerecord:

    # attributes:

    # errors:
    #   models:
    #     user:
    #       custom_error_example: 'example'

    models:
      user:
        one: User
        other: Users
      paper_trail/version:
        one: Version
        other: Versions

  errors:
    actions:
      index: list
      new: create
      show: view
    attributes:
      email:
        invalid: should look like an email address.
      password:
        invalid: must not repeat characters (e.g. "111")
        uniform: must be complex. Use a combination of uppercase (A-Z), lowercase (a-z), number (0-9) and special characters.

  # helpers:

  date:
    formats:
      default: "%-m/%-d/%Y"   # 1/5/2019
      long: "%B %-d, %Y"      # January 5, 2019
      short: "%b %-d"         # Jan 5
      day_and_month: "%b %-d" # Jan 5
      month_and_year: "%b %Y" # Jan 2012
    order:
    - :month
    - :day
    - :year

  time:
    formats:
      default: "%a, %-d %b %Y %I:%M:%S %p %Z"
      long: "%B %-d, %Y %-I:%M%P"
      short: "%b %d %-I:%M%P"
      time: "%-I:%M%P"        # 1:30p
      day_and_month: "%b %-e" # Jan 5
      month_and_year: "%b %Y" # Jan 2012
