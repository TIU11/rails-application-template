# Model Translations
# See (http://guides.rubyonrails.org/i18n.html#translations-for-active-record-models)
# See (https://github.com/svenfuchs/rails-i18n/tree/master/rails/locale)
en:
  activerecord:

    # attributes:

    # errors:
    #   models:

    models:
      user:
        one: User
        other: Users
      version:
        one: Version
        other: Versions

  errors:
    actions:
      index: list
      new: create
      show: view

  # helpers:

  date:
    formats:
      default: "%-m/%-d/%Y"
      long: "%B %-d, %Y"
      short: "%b %d"
    order:
    - :month
    - :day
    - :year

  time:
    formats:
      default: "%a, %d %b %Y %I:%M:%S %p %Z"
      long: "%B %-d, %Y %-I:%M%P"
      short: "%b %d %-I:%M%P"
      time: "%-I:%M%P" # From Time::DATE_FORMATS[:time]
